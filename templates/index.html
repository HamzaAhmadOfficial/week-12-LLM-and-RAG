<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Document Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .code-font { font-family: 'Fira Code', monospace; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 md:p-8">

    <div class="max-w-3xl mx-auto">
        <!-- Header -->
        <header class="mb-10 border-b border-slate-700 pb-6">
            <h1 class="text-3xl font-bold text-white">
                RAG Explorer
            </h1>
            <p class="text-slate-400 mt-1">Intelligent document retrieval and generation system.</p>
        </header>

        <div class="space-y-6">
            <!-- Document Management -->
            <section class="bg-slate-800 p-6 rounded-lg border border-slate-700 shadow-sm">
                <h2 class="text-sm uppercase tracking-widest font-semibold text-slate-400 mb-4">
                    Document Source
                </h2>
                <form action="/upload" method="post" enctype="multipart/form-data" class="flex flex-col sm:flex-row gap-3">
                    <input type="file" name="file" 
                        class="block w-full text-sm text-slate-400
                        file:mr-4 file:py-2 file:px-4
                        file:rounded file:border-0
                        file:text-xs file:font-bold file:uppercase
                        file:bg-slate-700 file:text-slate-200
                        hover:file:bg-slate-600 transition-all cursor-pointer">
                    <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 px-5 py-2 rounded font-semibold text-sm transition-colors">
                        Upload
                    </button>
                </form>
            </section>

            <!-- Query Section -->
            <section class="bg-slate-800 p-6 rounded-lg border border-slate-700 shadow-sm">
                <h2 class="text-sm uppercase tracking-widest font-semibold text-slate-400 mb-4">
                    Search Interface
                </h2>
                <div class="flex gap-2">
                    <input type="text" id="question" placeholder="Enter your question here..." 
                        class="flex-1 bg-slate-900 border border-slate-600 rounded px-4 py-2 text-sm focus:outline-none focus:border-indigo-500 transition-colors">
                    <button onclick="ask()" id="askBtn" class="bg-indigo-600 hover:bg-indigo-700 px-5 py-2 rounded font-semibold text-sm transition-colors">
                        Run Query
                    </button>
                </div>

                <!-- Output Display -->
                <div class="mt-8">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-xs font-bold text-slate-500 uppercase">System Output</span>
                        <div id="loader" class="hidden text-indigo-400 text-xs animate-pulse font-mono">Processing...</div>
                    </div>
                    
                    <div id="responseContainer" class="hidden">
                        <div class="bg-slate-950 p-5 rounded border border-slate-700 code-font text-sm text-indigo-100 leading-relaxed whitespace-pre-wrap" id="response"></div>
                    </div>
                </div>
            </section>
        </div>

        <footer class="mt-12 text-center text-slate-600 text-xs font-mono">
            ChromaDB • Transformers • Flask
        </footer>
    </div>

    <script>
    async function ask() {
        const q = document.getElementById("question").value;
        const respDiv = document.getElementById("response");
        const respCont = document.getElementById("responseContainer");
        const loader = document.getElementById("loader");
        const btn = document.getElementById("askBtn");

        if(!q) return;

        loader.classList.remove("hidden");
        respCont.classList.add("hidden");
        btn.disabled = true;
        btn.classList.add("opacity-50");

        try {
            const response = await fetch("/ask", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({question: q})
            });
            const data = await response.json();
            
            respDiv.innerText = data.answer;
            respCont.classList.remove("hidden");
        } catch (error) {
            respDiv.innerText = "System Error: Failed to fetch response from API.";
            respCont.classList.remove("hidden");
        } finally {
            loader.classList.add("hidden");
            btn.disabled = false;
            btn.classList.remove("opacity-50");
        }
    }
    </script>
</body>
</html>
